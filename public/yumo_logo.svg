<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 1140" fill="none" stroke="#000000" stroke-width="18" stroke-linecap="square" stroke-linejoin="miter">
  <!-- 頂邊(左短段) -->
  <line x1="50" y1="50" x2="170" y2="50"/>
  <!-- 頂邊(主段,有缺口) -->
  <line x1="235" y1="50" x2="1000" y2="50"/>
  <!-- 右邊 -->
  <line x1="1000" y1="50" x2="1000" y2="1000"/>
  <!-- 底邊(左段) -->
  <line x1="50" y1="1000" x2="425" y2="1000"/>
  <!-- 底邊(右段) -->
  <line x1="525" y1="1000" x2="1000" y2="1000"/>
  <!-- 左邊 -->
  <line x1="50" y1="50" x2="50" y2="1000"/>

  <!-- 矩形帶:上緣斜線 -->
  <line x1="50" y1="50" x2="1100" y2="375"/>
  <!-- 矩形帶:下緣斜線 -->
  <line x1="50" y1="50" x2="1100" y2="525"/>
  <!-- 矩形帶:末端封閉 -->
  <line x1="1100" y1="375" x2="1100" y2="525"/>

  <!-- 對角線(左上到右下角) -->
  <line x1="50" y1="50" x2="1000" y2="1000"/>

  <!-- 底部延伸線(穿出底邊到框外) -->
  <line x1="50" y1="50" x2="520" y2="1100"/>
</svg>
